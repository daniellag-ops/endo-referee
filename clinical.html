<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Endo-Referee: 90% Probability Engine</title>
    <style>
        body { font-family: -apple-system, sans-serif; background: #f4f7f6; display: flex; flex-direction: column; align-items: center; padding: 20px; }
        .card { background: white; padding: 25px; border-radius: 12px; max-width: 480px; width: 100%; box-shadow: 0 10px 25px rgba(0,0,0,0.1); border-top: 6px solid #9b59b6; }
        .tabs { display: flex; margin-bottom: 20px; border-bottom: 2px solid #eee; }
        .tab { flex: 1; text-align: center; padding: 10px; cursor: pointer; font-weight: bold; color: #95a5a6; }
        .tab.active { color: #9b59b6; border-bottom: 2px solid #9b59b6; }
        .input-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-size: 0.85em; font-weight: bold; color: #34495e; }
        input { width: 100%; padding: 12px; border: 1px solid #dcdde1; border-radius: 6px; box-sizing: border-box; }
        .btn { width: 100%; padding: 15px; background: #9b59b6; color: white; border: none; border-radius: 6px; font-weight: bold; cursor: pointer; }
        #output { margin-top: 20px; padding: 20px; border-radius: 8px; display: none; text-align: center; background: #f3e5f5; border: 2px solid #ce93d8; }
        .stat-box { display: flex; justify-content: space-around; margin-top: 15px; font-size: 0.8em; color: #7f8c8d; }
    </style>
</head>
<body>

<div class="card">
    <div class="tabs">
        <div class="tab" onclick="location.href='clinical.html'">Triage</div>
        <div class="tab active">90% Success Goal</div>
    </div>

    <h2 style="margin-top:0;">The 90% Probability Engine</h2>
    <p style="font-size: 0.8em; color: #7f8c8d;">Stochastic Attrition Modeling for Live Birth</p>

    <div class="input-group">
        <label>Patient Age at Freezing</label>
        <input type="number" id="age_goal" value="34">
    </div>

    <button class="btn" onclick="runProbabilitySim()">Calculate 90% Target</button>

    <div id="output">
        <div style="font-size: 0.9em; color: #6a1b9a; font-weight: bold;">Target for 90% Live Birth Probability:</div>
        <div id="egg_count" style="font-size: 3em; font-weight: bold; color: #4a148c; margin: 10px 0;">--</div>
        <div style="font-size: 0.85em; font-weight: bold;">Mature Oocytes Needed</div>
        
        <div class="stat-box">
            <div>Thaw Survival: <span id="thaw_rate">90</span>%</div>
            <div>Euploidy: <span id="eu_rate">--</span>%</div>
        </div>
        
        <p id="context" style="font-size: 0.75em; margin-top: 15px; text-align: left; line-height: 1.4; color: #4a148c;"></p>
    </div>
</div>

<script>
function runProbabilitySim() {
    const age = parseInt(document.getElementById('age_goal').value);
    const out = document.getElementById('output');
    const count = document.getElementById('egg_count');
    const euRate = document.getElementById('eu_rate');
    const context = document.getElementById('context');
    
    out.style.display = 'block';

    let target = 0;
    let euploidy = 0;

    // Assumptions based on SART and Literature Benchmarks
    if (age < 35) {
        target = 20;
        euploidy = 65;
        context.innerText = "High resiliency. Goal is achievable in 1-2 cycles. This protects against the 38% surgical tax.";
    } else if (age < 38) {
        target = 28;
        euploidy = 50;
        context.innerText = "Declining euploidy requires higher volume. Recommend 2-3 stimulation cycles before surgery.";
    } else if (age < 41) {
        target = 45;
        euploidy = 30;
        context.innerText = "Critical Age. Attrition funnel is steep. 90% probability requires significant volume due to chromosomal risks.";
    } else {
        target = 60;
        euploidy = 15;
        context.innerText = "Donor oocyte discussion may be indicated if temporal decay is high.";
    }

    count.innerText = target;
    euRate.innerText = euploidy;
}
</script>
</body>
</html>
