<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Endo-Predictor: Velocity AI</title>
    <style>
        body { font-family: -apple-system, sans-serif; background: #f4f7f6; display: flex; flex-direction: column; align-items: center; padding: 20px; }
        .card { background: white; padding: 25px; border-radius: 12px; max-width: 460px; width: 100%; box-shadow: 0 10px 25px rgba(0,0,0,0.1); border-top: 6px solid #e74c3c; }
        .input-group { margin-bottom: 12px; }
        label { display: block; margin-bottom: 4px; font-size: 0.8em; color: #7f8c8d; font-weight: bold; }
        input, select { width: 100%; padding: 10px; border: 1px solid #dcdde1; border-radius: 6px; box-sizing: border-box; font-size: 15px; }
        .btn-predict { width: 100%; padding: 15px; background: #e74c3c; color: white; border: none; border-radius: 6px; font-size: 1em; font-weight: bold; cursor: pointer; margin-top: 15px; }
        #result { margin-top: 20px; padding: 20px; border-radius: 8px; display: none; text-align: center; }
        .velocity-box { background: #2c3e50; color: #ecf0f1; padding: 10px; border-radius: 6px; margin-bottom: 10px; font-family: monospace; }
        .red { background: #fee2e2; color: #991b1b; border: 2px solid #f87171; }
        .green { background: #dcfce7; color: #166534; border: 2px solid #4ade80; }
    </style>
</head>
<body>

<div class="card">
    <h2 style="margin:0;">Endo-Referee: Velocity</h2>
    <p style="font-size:0.8em; color:gray;">Tracking Biological Decay Speed</p>
    
    <div class="input-group"><label>Previous AMH (e.g. 6 months ago)</label><input type="number" id="amh_prev" step="0.1"></div>
    <div class="input-group"><label>Current AMH (Today)</label><input type="number" id="amh_now" step="0.1"></div>
    <div class="input-group"><label>Months Elapsed</label><input type="number" id="months" value="6"></div>
    
    <hr>
    <div class="input-group"><label>Age</label><input type="number" id="age" value="34"></div>
    <div class="input-group"><label>Presentation</label><select id="bilateral"><option value="1">Unilateral</option><option value="2">Bilateral</option></select></div>

    <button class="btn-predict" onclick="calculate()">Analyze Velocity & Risk</button>

    <div id="result">
        <div class="velocity-box" id="v_output"></div>
        <div id="status" style="font-weight:bold; font-size:1.2em;"></div>
        <div id="msg" style="margin-top:10px; font-size:0.9em;"></div>
    </div>
</div>

<script>
function calculate() {
    const now = parseFloat(document.getElementById('amh_now').value);
    const prev = parseFloat(document.getElementById('amh_prev').value);
    const months = parseInt(document.getElementById('months').value);
    const bilateral = parseInt(document.getElementById('bilateral').value);
    
    let riskScore = 0;
    let vText = "Incomplete Trend Data";

    if (prev && now && months > 0) {
        const drop = ((prev - now) / prev) * 100;
        const rate = drop / months;
        vText = `DECAY RATE: ${rate.toFixed(1)}% / MONTH`;
        
        // Critical Velocity Thresholds
        if (rate > 4.3) riskScore += 6; // Matching the 26% / 6mo paper finding
        else if (rate > 1.5) riskScore += 3;
    }

    if (bilateral == 2) riskScore += 3;
    
    const res = document.getElementById('result');
    res.style.display = 'block';
    document.getElementById('v_output').innerText = vText;

    if (riskScore >= 6) {
        res.className = 'red';
        document.getElementById('status').innerText = "REFEREE CALL: RED";
        document.getElementById('msg').innerHTML = "<b>AGGRESSIVE DECAY:</b> Patient is losing reserve 4x faster than controls. Surgery high risk.";
    } else {
        res.className = 'green';
        document.getElementById('status').innerText = "REFEREE CALL: GREEN";
        document.getElementById('msg').innerText = "Stable or Expected Decline. Proceed with Standard Monitoring.";
    }
}
</script>
</body>
</html>
