<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Endo-Predictor: Clinical v7.1</title>
    <style>
        body { font-family: -apple-system, sans-serif; background: #f4f7f6; display: flex; flex-direction: column; align-items: center; padding: 20px; }
        .card { background: white; padding: 25px; border-radius: 12px; max-width: 460px; width: 100%; box-shadow: 0 10px 25px rgba(0,0,0,0.1); border-top: 6px solid #2ecc71; }
        h2 { color: #2c3e50; margin: 0 0 5px 0; }
        .subtitle { color: #7f8c8d; font-size: 0.85em; margin-bottom: 20px; }
        .section-title { font-size: 0.9em; color: #34495e; font-weight: bold; margin: 15px 0 10px 0; border-bottom: 1px solid #eee; padding-bottom: 5px; }
        .input-group { margin-bottom: 12px; }
        label { display: block; margin-bottom: 4px; font-size: 0.8em; color: #7f8c8d; }
        input, select { width: 100%; padding: 10px; border: 1px solid #dcdde1; border-radius: 6px; box-sizing: border-box; font-size: 15px; }
        .flex-row { display: flex; gap: 10px; }
        .btn-predict { width: 100%; padding: 15px; background: #2ecc71; color: white; border: none; border-radius: 6px; font-size: 1em; font-weight: bold; cursor: pointer; margin-top: 15px; }
        #result { margin-top: 20px; padding: 15px; border-radius: 8px; display: none; text-align: center; border: 2px solid transparent; }
        .red { background: #fee2e2; color: #991b1b; border-color: #f87171; }
        .yellow { background: #fef3c7; color: #92400e; border-color: #fbbf24; }
        .green { background: #dcfce7; color: #166534; border-color: #4ade80; }
        .velocity-badge { font-size: 0.8em; font-weight: bold; padding: 4px 8px; border-radius: 12px; display: inline-block; margin-top: 5px; background: rgba(0,0,0,0.05); }
    </style>
</head>
<body>

<div class="card">
    <h2>Endo-Predictor AI</h2>
    <div class="subtitle">v7.1: Longitudinal Reserve Analysis</div>
    
    <div class="section-title">AMH VELOCITY (6-12 Month Trend)</div>
    <div class="flex-row">
        <div class="input-group" style="flex: 1;"><label>Current AMH</label><input type="number" id="amh_now" value="2.0" step="0.1"></div>
        <div class="input-group" style="flex: 1;"><label>Previous AMH</label><input type="number" id="amh_prev" placeholder="Optional" step="0.1"></div>
    </div>
    <div class="input-group"><label>Months Between Tests</label><input type="number" id="months" value="6"></div>

    <div class="section-title">CLINICAL PROFILE</div>
    <div class="flex-row">
        <div class="input-group" style="flex: 1;"><label>Age</label><input type="number" id="age" value="34"></div>
        <div class="input-group" style="flex: 1;"><label>Location</label>
            <select id="bilateral">
                <option value="1">Unilateral</option>
                <option value="2">Bilateral</option>
            </select>
        </div>
    </div>
    <div class="input-group">
        <label>Surgical History</label>
        <select id="history">
            <option value="0">Primary Surgery</option>
            <option value="1">Recurrent (Previous Excision)</option>
        </select>
    </div>

    <button class="btn-predict" onclick="runVelocityAI()">Analyze Risk Profile</button>

    <div id="result">
        <div id="call" style="font-size: 1.2em; font-weight: bold;"></div>
        <div id="velocity-status" class="velocity-badge"></div>
        <div id="mandate" style="margin-top: 10px; font-size: 0.9em;"></div>
    </div>
</div>

<script>
function runVelocityAI() {
    const now = parseFloat(document.getElementById('amh_now').value);
    const prev = parseFloat(document.getElementById('amh_prev').value);
    const months = parseInt(document.getElementById('months').value);
    const age = parseInt(document.getElementById('age').value);
    const bilateral = parseInt(document.getElementById('bilateral').value);
    const history = parseInt(document.getElementById('history').value);

    let score = 0;
    let velocityText = "Single Point Analysis";

    // 1. Velocity Calculation (The Core Upgrade)
    if (prev && months > 0) {
        const dropPercent = ((prev - now) / prev) * 100;
        const monthlyRate = dropPercent / months;
        velocityText = `Velocity: -${dropPercent.toFixed(1)}% total (${monthlyRate.toFixed(1)}%/mo)`;
        
        if (monthlyRate > 4) score += 5; // Aggressive Decay (>24% per 6mo)
        else if (monthlyRate > 1.5) score += 2; // Above Average Decay
    }

    // 2. Static Risk Markers
    if (age >= 35) score += 2;
    if (bilateral === 2) score += 3;
    if (history === 1) score += 3;
    if (now < 1.1) score += 2;

    const res = document.getElementById('result');
    res.style.display = 'block';
    document.getElementById('velocity-status').innerText = velocityText;

    if (score >= 6) {
        res.className = 'red';
        document.getElementById('call').innerText = "REFEREE CALL: RED";
        document.getElementById('mandate').innerHTML = "<b>CRITICAL:</b> Biological Decay exceeds safety thresholds.<br>Immediate fertility preservation required.";
    } else if (score >= 3) {
        res.className = 'yellow';
        document.getElementById('call').innerText = "REFEREE CALL: YELLOW";
        document.getElementById('mandate').innerHTML = "<b>WARNING:</b> Significant reserve tax detected.<br>Preservation strongly recommended.";
    } else {
        res.className = 'green';
        document.getElementById('call').innerText = "REFEREE CALL: GREEN";
        document.getElementById('mandate').innerHTML = "<b>STABLE:</b> Proceed with standard monitoring.<br>Low immediate surgical risk.";
    }
}
</script>
</body>
</html>
